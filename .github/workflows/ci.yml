name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Cache pip packages so torch doesn't re-download every run
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          pip install "torch==2.1.0" --index-url https://download.pytorch.org/whl/cpu
          pip install pybind11 numpy scikit-learn fastapi uvicorn pydantic requests

      - name: Install build tools
        run: sudo apt-get install -y cmake build-essential

      # Cache the compiled build directory so C++ doesn't recompile if cpp/ unchanged
      - name: Cache C++ build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-cpp-${{ hashFiles('cpp/**') }}

      - name: Build C++ extension
        run: |
          TORCH_CMAKE=$(python -c "import torch; print(torch.utils.cmake_prefix_path)")
          mkdir -p build && cd build
          cmake ../cpp \
            -DCMAKE_PREFIX_PATH="$TORCH_CMAKE" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j$(nproc)
          cp sign_inference*.so ../

      - name: Run smoke tests
        run: python tests/smoke_test.py
